<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>carrito de compras</title>
    <link rel="stylesheet" href="../css/carrito.css" />
  </head>
  <body>
    <h1>carrito de compras</h1>
    <div class="layout">
      <div style="display: flex; flex-direction: column; gap: 1.5rem">
        <div class="panel">
          <div class="panel-header">agregar producto</div>
          <div class="form-body">
            <div class="row-2">
              <div class="field">
                <label>ID del producto</label>
                <input
                  type="number"
                  id="inp-id"
                  min="1"
                  step="1"
                  placeholder="EJ: 1"
                />
                <span class="field-error" id="err-id"></span>
              </div>
              <div class="field">
                <label>nombre</label>
                <input type="text" id="inp-nombre" placeholder="EJ: camiseta" />
                <span class="field-error" id="err-nombre"></span>
              </div>
            </div>
            <div class="row-2">
              <div class="field">
                <label>precio ($)</label>
                <input
                  type="number"
                  id="inp-precio"
                  min="0"
                  step="0.01"
                  placeholder="0.00"
                />
              </div>
              <div class="field">
                <label>cantidad</label>
                <input
                  type="number"
                  id="inp-cantidad"
                  min="1"
                  step="1"
                  placeholder="1"
                />
              </div>
            </div>
            <button class="btn btn-primary" onclick="handleAgregar()">
              + agregar al carrito
            </button>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">productos en el carrito</div>
          <ul id="cart-list">
            <li class="empty-msg">el carrito esta vacio</li>
          </ul>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 1.5rem">
        <div class="panel">
          <div class="panel-header">descuento</div>
          <div class="form-body">
            <div class="field">
              <label>porcentaje (%)</label>
              <div class="discount-row">
                <input
                  type="number"
                  id="inp-descuento"
                  min="0"
                  max="100"
                  step="1"
                  placeholder="0"
                />
                <button class="btn btn-discount" onclick="handleDescuento()">
                  aplicar
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header">resumen</div>
          <div class="summary">
            <div class="summary-row">
              <span>subtotal</span>
              <span id="lbl-subtotal">$0.00</span>
            </div>
            <div
              class="summary-row savings"
              id="row-savings"
              style="display: none"
            >
              <span id="lbl-savings-label">descuento (0%)</span>
              <span id="lbl-savings">-$0.00</span>
            </div>
            <div class="summary-row total">
              <span>total</span>
              <span id="lbl-total">$0.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="toast"></div>
    <script src="../js/carrito.js"></script>
  </body>
</html>
